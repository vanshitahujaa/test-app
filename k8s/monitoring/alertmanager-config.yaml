# Alertmanager configuration that forwards firing alerts in the
# `shortener` namespace to AutoFixOps' webhook.
#
# Apply by patching the AlertmanagerConfig used by your kube-prometheus-stack
# release, or by setting `alertmanager.config` in its values.yaml to this.

apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: autofixops-route
  namespace: shortener
  labels:
    release: kube-prometheus-stack
spec:
  route:
    receiver: autofixops
    groupBy: [alertname, namespace, pod]
    groupWait: 10s
    groupInterval: 30s
    repeatInterval: 5m
    matchers:
      - name: namespace
        value: shortener
        matchType: "="
  receivers:
    - name: autofixops
      webhookConfigs:
        - url: http://autofixops-api.autofixops.svc.cluster.local:8000/api/v1/alerts
          sendResolved: true
          httpConfig:
            followRedirects: true
