apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: shortener
data:
  LOG_LEVEL: "INFO"
  CACHE_TTL_SECONDS: "60"
  DB_POOL_SIZE: "5"
  DB_MAX_OVERFLOW: "5"
  CHAOS_ENABLED: "true"   # safe here — namespace is `shortener`, not prod
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: shortener
  labels:
    app: api
spec:
  selector:
    app: api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: shortener
  labels:
    app: api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ghcr.io/vanshitahujaa/shortener-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef: { name: api-config }
            - secretRef:    { name: postgres-creds }
          env:
            - name: DATABASE_URL
              value: "postgresql://shortener:shortener@postgres:5432/shortener"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
          # Tight on purpose: a single chaos /leak call should put you
          # over the limit and trip the AutoFixOps memory-leak alert.
          resources:
            requests:
              cpu: 50m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 192Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
