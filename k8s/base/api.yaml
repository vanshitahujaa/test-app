apiVersion: v1
data:
  CACHE_TTL_SECONDS: '60'
  CHAOS_ENABLED: 'true'
  DB_MAX_OVERFLOW: '5'
  DB_POOL_SIZE: '5'
  LOG_LEVEL: INFO
kind: ConfigMap
metadata:
  name: api-config
  namespace: shortener
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: api
  name: api
  namespace: shortener
spec:
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  selector:
    app: api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: api
  name: api
  namespace: shortener
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - env:
        - name: DATABASE_URL
          value: postgresql://shortener:shortener@postgres:5432/shortener
        - name: REDIS_URL
          value: redis://redis:6379/0
        envFrom:
        - configMapRef:
            name: api-config
        - secretRef:
            name: postgres-creds
        image: ghcr.io/vanshitahujaa/shortener-api:latest
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 2
        name: api
        ports:
        - containerPort: 8000
          name: http
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /readyz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
        resources:
          limits:
            cpu: 500m
            memory: 200Mi
          requests:
            cpu: 50m
            memory: 96Mi
