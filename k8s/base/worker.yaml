apiVersion: v1
kind: Service
metadata:
  name: worker
  namespace: shortener
  labels:
    app: worker
spec:
  selector:
    app: worker
  ports:
    - name: metrics
      port: 9100
      targetPort: 9100
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: shortener
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/vanshitahujaa/shortener-worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9100
          env:
            - name: REDIS_URL
              value: "redis://redis:6379/0"
            - name: DATABASE_URL
              value: "postgresql://shortener:shortener@postgres:5432/shortener"
            - name: BATCH_SIZE
              value: "100"
            - name: LEAK_RATE_KB
              value: "0"   # set to e.g. 256 to demo a slow worker leak
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            tcpSocket: { port: metrics }
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            tcpSocket: { port: metrics }
            initialDelaySeconds: 5
            periodSeconds: 5
