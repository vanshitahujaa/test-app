# Standalone Prometheus config used by docker-compose only.
# In Kubernetes, kube-prometheus-stack discovers services via the
# ServiceMonitors in k8s/monitoring/.

global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: api
    static_configs:
      - targets: ["api:8000"]

  - job_name: worker
    static_configs:
      - targets: ["worker:9100"]
