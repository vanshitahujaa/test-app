# Local dev: spin up the full stack on docker-compose without Kubernetes.
# Useful for hacking on the service code; chaos endpoints work the same way.
#
#   docker compose up --build
#   curl -X POST localhost:8000/shorten -H 'Content-Type: application/json' \
#        -d '{"url":"https://example.com"}'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shortener
      POSTGRES_PASSWORD: shortener
      POSTGRES_DB: shortener
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "shortener"]
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 10

  api:
    build:
      context: ./services/api
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      DATABASE_URL: postgresql://shortener:shortener@postgres:5432/shortener
      REDIS_URL: redis://redis:6379/0
      CHAOS_ENABLED: "true"
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./services/worker
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    environment:
      DATABASE_URL: postgresql://shortener:shortener@postgres:5432/shortener
      REDIS_URL: redis://redis:6379/0
      LEAK_RATE_KB: "0"
    ports:
      - "9100:9100"

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=2h"
    volumes:
      - ./scripts/prometheus.local.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on: [api, worker]

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: shortener-admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - "3001:3000"
    depends_on: [prometheus]

volumes:
  pgdata:
  redisdata:
